function formatResponse(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/^### (.*)/gm, '<strong>$1</strong>')
    .replace(/^## (.*)/gm, '<strong>$1</strong>')
    .replace(/^# (.*)/gm, '<strong>$1</strong>')
    .split('\n')
    .reduce((acc, line) => {
      if (line.startsWith('- ') || line.startsWith('• ')) {
        if (!acc.inList) { acc.html += '<ul>'; acc.inList = true; }
        acc.html += `<li>${line.slice(2)}</li>`;
      } else {
        if (acc.inList) { acc.html += '</ul>'; acc.inList = false; }
        if (line.trim()) acc.html += `<p>${line}</p>`;
      }
      return acc;
    }, { html: '', inList: false })
    .html + (false ? '</ul>' : '');
}

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { "Content-Type": "application/json", "x-api-key": "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", "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: RESUME_CONTEXT,
        messages: history
      })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || "Sorry, I couldn't retrieve a response.";
    history.push({ role: 'assistant', content: reply });

    removeTyping();
    renderMessage('assistant', formatResponse(reply));
  } catch (err) {
    removeTyping();
    renderMessage('assistant', '<p>Connection error — please try again.</p>');
  }

  isLoading = false;
  btn.disabled = false;
}

function showWelcome() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message assistant';

  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = 'MB';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = `
    <p>Hi! I'm a bot that knows Martin Baer's resume inside and out. Ask me anything — his experience at IBM, Apple, or Cisco, his skills in Perl or cloud platforms, his personal ventures, or whether he's available for contract work.</p>
    <div class="chips" id="chips"></div>
  `;

  div.appendChild(icon);
  div.appendChild(bubble);
  chat.appendChild(div);

  const chips = document.getElementById('chips');
  QUICK_QUESTIONS.forEach(q => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = q;
    chip.onclick = () => {
      document.getElementById('input').value = q;
      send();
    };
    chips.appendChild(chip);
  });
}

function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  sendMessage(text);
}

document.getElementById('send-btn').addEventListener('click', send);

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 140) + 'px';
});

showWelcome();
</script>
</body>
