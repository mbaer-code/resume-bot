const history = [];
let isLoading = false;

function renderMessage(role, html) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = role === 'assistant' ? 'MB' : 'You';

  bubble.innerHTML = html;

  div.appendChild(icon);

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.id = 'typing-msg';

  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = 'MB';

  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

  div.appendChild(icon);
  div.appendChild(indicator);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-msg');
  if (el) el.remove();
}

function formatResponse(text) {
  let html = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/^#{1,3} (.*)/gm, '<strong>$1</strong>');

  const lines = html.split('\n');
  let result = '';
  let inList = false;

  for (const line of lines) {
    if (line.startsWith('- ') || line.startsWith('• ')) {
      if (!inList) { result += '<ul>'; inList = true; }
      result += `<li>${line.slice(2)}</li>`;
    } else {
      if (inList) { result += '</ul>'; inList = false; }
      if (line.trim()) result += `<p>${line}</p>`;
    }
  }
  if (inList) result += '</ul>';
  return result;
}

async function sendMessage(text) {
  if (!text.trim() || isLoading) return;
  isLoading = true;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  renderMessage('user', `<p>${text.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p>`);
  history.push({ role: 'user', content: text });

  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        "Content-Type": "application/json",        "x-api-key":"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",
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: RESUME_CONTEXT,
        messages: history
      })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || 'Sorry, I could not retrieve a response.';
    history.push({ role: 'assistant', content: reply });

    removeTyping();
    renderMessage('assistant', formatResponse(reply));
  } catch (err) {
    removeTyping();
    renderMessage('assistant', '<p>Connection error — please try again.</p>');
  }

  isLoading = false;
  btn.disabled = false;
}

  const chat = document.getElementById('chat');

  div.className = 'message assistant';

  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = 'MB';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = `
    <p>Hi — I know Martin Baer's resume inside and out. Ask me anything about his 40+ year career: his experience at IBM, Apple, or Cisco, his skills in Perl, C++, or cloud platforms, his personal ventures, or his availability for contract work.</p>
    <div class="chips" id="chips"></div>
  `;

  div.appendChild(icon);
  div.appendChild(bubble);
  chat.appendChild(div);

  const chips = document.getElementById('chips');
  QUICK_QUESTIONS.forEach(q => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = q;
    chip.onclick = () => {
      document.getElementById('input').value = q;
      send();
    };
    chips.appendChild(chip);
  });
}

function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  sendMessage(text);
}

document.getElementById('send-btn').addEventListener('click', send);

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 140) + 'px';
});
